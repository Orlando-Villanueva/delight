name: Laravel Tests

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      run: |
        git init .
        git remote add origin https://github.com/${{ github.repository }}.git

        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch --no-tags --depth=1 origin "+refs/pull/${{ github.event.pull_request.number }}/merge:refs/remotes/pull/${{ github.event.pull_request.number }}/merge"
          git checkout --detach "refs/remotes/pull/${{ github.event.pull_request.number }}/merge"
        else
          git fetch --no-tags --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
        fi
      
    - name: Setup PHP
      uses: shivammathur/setup-php@2.35.5
      with:
        php-version: '8.4'
        extensions: mbstring, dom, fileinfo, mysql, sqlite
        coverage: none
        
    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: ~/.composer/cache/files
        key: composer-${{ hashFiles('composer.lock') }}
        restore-keys: composer-
        
    - name: Install Dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader
      
    - name: Copy Environment File
      run: cp .env.testing .env
      
    - name: Generate Application Key
      run: php artisan key:generate
      
    - name: Directory Permissions
      run: chmod -R 755 storage bootstrap/cache

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install npm dependencies
      run: npm ci

    - name: Build assets with Vite
      run: npm run build

    - name: Run Database Migrations
      run: php artisan migrate --force --env=testing
      
    - name: Run Tests
      run: ./vendor/bin/pest --parallel
